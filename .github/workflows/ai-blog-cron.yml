name: Auto Generate AI Post

on:
  schedule:
    # 每天北京时间早上 08:00 运行一次 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 给予流水线推送代码的权限
      pages: write    # 部署 Github Pages 的权限
      id-token: write # 部署 Github Pages 的权限

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run AI Generator Script
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      run: npm run generate:ai-post

    - name: Commit and Push New Post
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查是否有文件改动 (主要看 content/posts 目录下是否增加了文章)
        if [ -n "$(git status --porcelain content/posts/)" ]; then
          echo "检测到新生成的博文，准备提交并推送..."
          git add content/posts/
          git commit -m "chore: auto-generate daily AI blog post"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "没有生成新的博文，跳过提交。"
        fi

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true


      
    - name: Build Hugo Site
      run: hugo --minify

    - name: Generate FlexSearch Index
      run: npm run build:index
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
