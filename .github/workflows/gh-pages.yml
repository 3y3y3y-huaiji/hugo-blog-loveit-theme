name: GitHub Pages

on:
  push:
    branches:
      - main  # 设置为你的默认分支名称
  workflow_dispatch:  # 允许手动触发

# 设置GITHUB_TOKEN的权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true  # 如果使用子模块，请启用此选项
        fetch-depth: 0    # 获取完整历史记录，以便Hugo获取git信息
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript Typecheck
      run: npm run typecheck

    - name: Build Theme JS
      run: npm run build:theme

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true


      
    - name: Build Hugo Site
      run: hugo --minify

    - name: Generate FlexSearch Index
      run: npm run build:index
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4